<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/pwa-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#9f3248" />
    <meta name="description" content="Biddius - An online auction platform for buying and selling a wide range of products through competitive bidding." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Biddius" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <title>Biddius</title>
    <style>
      #pwa-splash {
        position: fixed;
        inset: 0;
        background: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        font-family: sans-serif;
      }
      #pwa-splash img {
        width: 88px;
        height: 88px;
        border-radius: 22px;
        box-shadow: 0 4px 24px rgba(159,50,72,0.18);
      }
      #pwa-splash-spinner {
        margin-top: 28px;
        width: 36px;
        height: 36px;
        border: 3px solid #f5e8eb;
        border-top: 3px solid #9f3248;
        border-radius: 50%;
        animation: pwa-spin 0.75s linear infinite;
      }
      @keyframes pwa-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="pwa-splash">
        <img src="/pwa-192x192.png" alt="Biddius" />
        <div id="pwa-splash-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
